name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify tag, runtime version, installed metadata, and changelog
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import importlib.metadata
          import importlib.util
          import os
          import sys
          from pathlib import Path

          tag = os.environ["GIT_TAG"]
          if tag.startswith("v"):
              tag = tag[1:]

          version_path = Path("src/oauth_codex/_version.py")
          spec = importlib.util.spec_from_file_location("oauth_codex._version", version_path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          runtime_version = module.__version__
          installed_version = importlib.metadata.version("oauth-codex")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")

          if tag != runtime_version:
              print(
                  f"Tag/runtime version mismatch: tag='{os.environ['GIT_TAG']}', runtime='{runtime_version}'",
                  file=sys.stderr,
              )
              sys.exit(1)

          if runtime_version != installed_version:
              print(
                  f"Runtime/installed version mismatch: runtime='{runtime_version}', installed='{installed_version}'",
                  file=sys.stderr,
              )
              sys.exit(1)

          if f"## {runtime_version}" not in changelog:
              print(
                  f"CHANGELOG.md is missing a section for version '{runtime_version}'",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Release validation passed: {runtime_version}")
          PY

      - name: Run test suite
        run: pytest -q

      - name: Build package
        run: |
          python -m build
          python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import importlib.metadata
          import oauth_codex
          from oauth_codex import AsyncClient, Client

          assert Client is not None
          assert AsyncClient is not None
          assert oauth_codex.__version__ == importlib.metadata.version("oauth-codex")
          print(f"release wheel smoke OK: {oauth_codex.__version__}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: validate-release
    environment:
      name: pypi
      url: https://pypi.org/p/oauth-codex
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
