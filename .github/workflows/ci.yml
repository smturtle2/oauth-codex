name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run test suite
        run: pytest -q

  package-smoke:
    name: Build and wheel smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import importlib.metadata
          import oauth_codex
          from oauth_codex import AsyncClient, Client

          assert Client is not None
          assert AsyncClient is not None
          assert oauth_codex.__version__ == importlib.metadata.version("oauth-codex")
          print(f"wheel smoke OK: {oauth_codex.__version__}")
          PY
